name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install package
        run: python -m pip install -e .

      - name: Check console entrypoint
        run: skratched-server --help

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python modules
        run: python -m py_compile server.py scripts/demo_flow.py skratched/__init__.py skratched/ai.py skratched/analyze.py skratched/config.py skratched/storage.py skratched/export.py skratched/semantic.py skratched/watcher.py skratched/cli.py

      - name: Check browser app JavaScript
        run: node --check static/app.js

      - name: Check browser smoke script syntax
        run: node --check scripts/browser_smoke.mjs

      - name: Run demo proof
        run: python scripts/demo_flow.py
